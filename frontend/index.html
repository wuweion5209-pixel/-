<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent 对话系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1a1a2e;
      color: white;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 12px;
      padding: 12px;
    }

    /* ======== 聊天区 ======== */
    .chat-panel {
      flex: 2;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .chat-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }

    .chat-toolbar span { font-size: 14px; color: #555; }

    .chat-toolbar button {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
    }
    .chat-toolbar button:hover { background: #c0392b; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #f1f3f4;
      color: #222;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: #fff3cd;
      color: #856404;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .chat-input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      resize: none;
      height: 60px;
      font-family: inherit;
      outline: none;
    }
    .chat-input-area textarea:focus { border-color: #1a1a2e; }

    .chat-input-area button {
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .chat-input-area button:hover { background: #16213e; }
    .chat-input-area button:disabled { background: #aaa; cursor: not-allowed; }

    /* ======== 知识库区 ======== */
    .knowledge-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 280px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 16px;
    }

    .card h3 {
      font-size: 14px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    .card textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      resize: vertical;
      height: 80px;
      font-family: inherit;
      outline: none;
      margin-bottom: 8px;
    }
    .card textarea:focus { border-color: #1a1a2e; }

    .btn-primary {
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }
    .btn-primary:hover { background: #16213e; }

    .btn-danger {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      margin-top: 8px;
    }
    .btn-danger:hover { background: #c0392b; }

    .knowledge-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
    }

    .knowledge-item {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #444;
      line-height: 1.5;
    }

    .knowledge-item .meta {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .knowledge-count {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .conv-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      max-height: 180px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #eee;
      background: #fafafa;
      transition: background 0.15s;
    }
    .conv-item:hover { background: #e8eaf0; }
    .conv-item.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .conv-item .conv-id { font-family: monospace; }
    .conv-item .conv-time { color: #aaa; font-size: 11px; }
    .conv-item.active .conv-time { color: #ccc; }

    .conv-input-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .conv-input-row input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }
    .conv-input-row input:focus { border-color: #1a1a2e; }
    .conv-input-row button {
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .conv-input-row button:hover { background: #16213e; }

    .loading-dot::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>
<body>

<header>AI Agent 对话系统</header>

<div class="main">

  <!-- 聊天区 -->
  <div class="chat-panel">
    <div class="chat-toolbar">
      <span id="session-info">当前会话：自动分配</span>
      <button onclick="newSession()">+ 新建对话</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <textarea id="chat-input" placeholder="输入消息，Ctrl+Enter 发送..." onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- 知识库区 -->
  <div class="knowledge-panel">

    <!-- 添加知识 -->
    <div class="card">
      <h3>添加知识</h3>
      <textarea id="knowledge-input" placeholder="输入要添加到知识库的文本内容..."></textarea>
      <input id="knowledge-source" type="text" placeholder="来源说明（可选，如：会议记录、产品文档）" style="width:100%;margin-top:6px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
      <button class="btn-primary" onclick="saveKnowledge()">添加到知识库</button>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
        <input type="file" id="pdf-input" accept=".pdf" style="flex:1;font-size:13px;">
        <button class="btn-primary" onclick="uploadPDF()">上传 PDF</button>
      </div>
      <div id="pdf-status" style="font-size:12px;color:#666;margin-top:6px;"></div>
    </div>

    <!-- 知识库内容 -->
    <div class="card">
      <h3>知识库内容</h3>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span class="knowledge-count" id="knowledge-count">加载中...</span>
        <button class="btn-primary" onclick="toggleKnowledge()" id="toggle-kb-btn" style="font-size:12px;padding:3px 10px;">查看</button>
      </div>
      <div class="knowledge-list" id="knowledge-list" style="display:none;max-height:300px;overflow-y:auto;"></div>
      <button class="btn-danger" id="clear-kb-btn" onclick="clearKnowledge()" style="display:none;margin-top:8px;">清空知识库</button>
    </div>

    <!-- 历史对话 -->
    <div class="card" style="display:flex; flex-direction:column; overflow:hidden;">
      <h3>历史对话</h3>
      <div class="conv-input-row">
        <input id="conv-id-input" type="text" placeholder="输入 Conversation ID 切换..." />
        <button onclick="switchConversation()">切换</button>
      </div>
      <button class="btn-primary" style="margin-top:6px;" onclick="loadConversations()">刷新历史</button>
      <div id="conv-list" style="margin-top:8px;overflow-y:auto;flex:1;"></div>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let currentConversationId = localStorage.getItem('conversation_id') || null;
  if (currentConversationId) {
    document.getElementById('session-info').textContent = `当前会话：${currentConversationId.slice(0, 8)}...`;
  }

  // ======== 聊天 ========

  function handleKey(e) {
    if (e.ctrlKey && e.key === 'Enter') sendMessage();
  }

  function appendMsg(role, text) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const btn = document.getElementById('send-btn');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    btn.disabled = true;
    appendMsg('user', text);

    const loadingDiv = appendMsg('assistant', '');
    loadingDiv.classList.add('loading-dot');
    loadingDiv.textContent = '思考中';

    try {
      const res = await fetch(`${API}/chat/agent_response`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, conversation_id: currentConversationId })
      });
      const data = await res.json();
      loadingDiv.classList.remove('loading-dot');
      if (data.status === 'success') {
        loadingDiv.textContent = data.answer;
        if (data.conversation_id) {
          currentConversationId = data.conversation_id;
          localStorage.setItem('conversation_id', currentConversationId);
          document.getElementById('session-info').textContent = `当前会话：${currentConversationId.slice(0, 8)}...`;
        }
      } else {
        loadingDiv.textContent = '请求失败：' + JSON.stringify(data);
      }
    } catch (e) {
      loadingDiv.classList.remove('loading-dot');
      loadingDiv.textContent = '网络错误：' + e.message;
    }
    btn.disabled = false;
    input.focus();
  }

  function newSession() {
    const id = prompt('请输入新对话的 Conversation ID：');
    if (!id || !id.trim()) return;
    const trimmed = id.trim();
    currentConversationId = trimmed;
    localStorage.setItem('conversation_id', currentConversationId);
    document.getElementById('session-info').textContent = `当前会话：${trimmed.slice(0, 8)}...`;
    document.getElementById('chat-messages').innerHTML = '';
    appendMsg('system', `新对话已创建：${trimmed.slice(0, 8)}...`);
  }

  // ======== 知识库 ========

  let knowledgeExpanded = false;

  async function loadKnowledge(renderList = false) {
    try {
      const res = await fetch(`${API}/knowledge/list`);
      const data = await res.json();
      document.getElementById('knowledge-count').textContent = `共 ${data.total} 条`;
      if (!renderList) return;
      const list = document.getElementById('knowledge-list');
      list.innerHTML = '';
      if (data.total === 0) {
        list.innerHTML = '<div style="color:#aaa;font-size:12px;text-align:center;padding:12px;">知识库为空</div>';
        return;
      }
      data.items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'knowledge-item';
        const preview = item.content.length > 80 ? item.content.slice(0, 80) + '...' : item.content;
        const source = item.metadata?.source || '手动添加';
        div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div>${preview}<div class="meta">来源：${source} | ID：${item.id.slice(0, 8)}...</div></div>
          <button onclick="deleteKnowledge('${item.id}', this)" style="flex-shrink:0;padding:2px 8px;font-size:11px;background:#ff4d4f;color:white;border:none;border-radius:4px;cursor:pointer;">删除</button>
        </div>`;
        list.appendChild(div);
      });
    } catch (e) {
      document.getElementById('knowledge-count').textContent = '加载失败';
    }
  }

  function toggleKnowledge() {
    knowledgeExpanded = !knowledgeExpanded;
    const list = document.getElementById('knowledge-list');
    const btn = document.getElementById('toggle-kb-btn');
    const clearBtn = document.getElementById('clear-kb-btn');
    if (knowledgeExpanded) {
      list.style.display = 'block';
      clearBtn.style.display = 'block';
      btn.textContent = '收起';
      loadKnowledge(true);
    } else {
      list.style.display = 'none';
      clearBtn.style.display = 'none';
      btn.textContent = '查看';
    }
  }

  async function saveKnowledge() {
    const input = document.getElementById('knowledge-input');
    const sourceInput = document.getElementById('knowledge-source');
    const text = input.value.trim();
    const source = sourceInput.value.trim() || 'manual';
    if (!text) { alert('请输入知识内容'); return; }

    try {
      const res = await fetch(`${API}/chat/ragsave`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, source })
      });
      const data = await res.json();
      if (data.status === 'success') {
        input.value = '';
        sourceInput.value = '';
        loadKnowledge(knowledgeExpanded);
      } else {
        alert('添加失败：' + data.message);
      }
    } catch (e) {
      alert('网络错误：' + e.message);
    }
  }

  async function uploadPDF() {
    const input = document.getElementById('pdf-input');
    const status = document.getElementById('pdf-status');
    const file = input.files[0];
    if (!file) { alert('请先选择 PDF 文件'); return; }

    const formData = new FormData();
    formData.append('file', file);
    status.textContent = '上传中...';
    try {
      const res = await fetch(`${API}/chat/upload_pdf`, { method: 'POST', body: formData });
      const data = await res.json();
      if (res.ok) {
        status.textContent = data.message;
        input.value = '';
        loadKnowledge(knowledgeExpanded);
      } else {
        status.textContent = '失败：' + data.detail;
      }
    } catch (e) {
      status.textContent = '网络错误：' + e.message;
    }
  }

  async function deleteKnowledge(id, btn) {
    btn.disabled = true;
    try {
      const res = await fetch(`${API}/knowledge/delete/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.status === 'success') {
        loadKnowledge(knowledgeExpanded);
      } else {
        alert('删除失败');
        btn.disabled = false;
      }
    } catch (e) {
      alert('网络错误：' + e.message);
      btn.disabled = false;
    }
  }

  async function clearKnowledge() {
    if (!confirm('确认清空全部知识库内容？')) return;
    try {
      const res = await fetch(`${API}/knowledge/clear`, { method: 'DELETE' });
      const data = await res.json();
      alert(`已清空 ${data.deleted_count} 条记录`);
      loadKnowledge(false);
    } catch (e) {
      alert('清空失败：' + e.message);
    }
  }

  // ======== 历史对话 ========
  async function loadConversations() {
    const list = document.getElementById('conv-list');
    list.innerHTML = '<span style="color:#888;font-size:12px;">加载中...</span>';
    try {
      const res = await fetch(`${API}/chat/show_conversatios`);
      const data = await res.json();
      const convs = data.message || [];
      if (convs.length === 0) {
        list.innerHTML = '<span style="color:#888;font-size:12px;">暂无历史对话</span>';
        return;
      }
      list.innerHTML = '';
      convs.forEach(conv => {
        const div = document.createElement('div');
        div.style.cssText = 'padding:6px 8px;margin-bottom:4px;background:#f5f5f5;border-radius:6px;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;align-items:center;';
        const shortId = conv.conversation_id.slice(0, 8) + '...';
        const date = new Date(conv.created_at).toLocaleString('zh-CN');
        div.innerHTML = `<span style="font-family:monospace;cursor:pointer;flex:1;" onclick="switchToConv('${conv.conversation_id}','${shortId}')">${shortId}</span><span style="color:#888;margin:0 8px;">${date}</span><button onclick="deleteConversation('${conv.conversation_id}',this)" style="background:#e74c3c;color:white;border:none;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;">删除</button>`;
        list.appendChild(div);
      });
    } catch (e) {
      list.innerHTML = '<span style="color:red;font-size:12px;">加载失败：' + e.message + '</span>';
    }
  }

  function switchToConv(id, shortId) {
    currentConversationId = id;
    localStorage.setItem('conversation_id', currentConversationId);
    document.getElementById('session-info').textContent = `当前会话：${shortId}`;
    document.getElementById('conv-id-input').value = '';
    appendMsg('system', `已切换到会话 ${shortId}`);
  }

  async function deleteConversation(id, btn) {
    if (!confirm(`确认删除会话 ${id.slice(0, 8)}...？`)) return;
    btn.disabled = true;
    try {
      const res = await fetch(`${API}/chat/delete_conversation?conversation_id=${encodeURIComponent(id)}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.status === 'success') {
        if (currentConversationId === id) {
          currentConversationId = null;
          localStorage.removeItem('conversation_id');
          document.getElementById('session-info').textContent = '无当前会话';
        }
        loadConversations();
      } else {
        alert('删除失败');
        btn.disabled = false;
      }
    } catch (e) {
      alert('网络错误：' + e.message);
      btn.disabled = false;
    }
  }

  function switchConversation() {
    const input = document.getElementById('conv-id-input');
    const id = input.value.trim();
    if (!id) { alert('请输入 Conversation ID'); return; }
    currentConversationId = id;
    localStorage.setItem('conversation_id', currentConversationId);
    document.getElementById('session-info').textContent = `当前会话：${id.slice(0, 8)}...`;
    input.value = '';
    appendMsg('system', `已切换到会话 ${id.slice(0, 8)}...`);
  }

  // 初始化
  loadKnowledge();
  loadConversations();
</script>

</body>
</html>
